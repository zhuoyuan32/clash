- name: "\U0001F1ED\U0001F1F0 香港节点"
  type: select
  include-all: true
  filter: "(?i)港|hk|hongkong|hong kong"
- name: "\U0001F1ED\U0001F1F0 台湾节点"
  type: select
  include-all: true
  filter: "(?i)台|tw|taiwan|tai wan"
- name: "\U0001F1EF\U0001F1F5 日本节点"
  type: select
  include-all: true
  filter: "(?i)日|jp|japan"
- name: "\U0001F1FA\U0001F1F2 美国节点"
  type: select
  include-all: true
  filter: "(?i)美|us|unitedstates|united states"
- name: "\U0001F52F 香港故转"
  type: fallback
  include-all: true
  tolerance: 20
  interval: 180
  filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
- name: "\U0001F52F 日本故转"
  type: fallback
  include-all: true
  tolerance: 20
  interval: 180
  filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
- name: "♻️ 香港自动"
  type: url-test
  include-all: true
  tolerance: 100
  interval: 180
  filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"
- name: "♻️ 日本自动"
  type: url-test
  include-all: true
  tolerance: 100
  interval: 180
  filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"
- name: "♻️ 美国自动"
  type: url-test
  include-all: true
  tolerance: 100
  interval: 180
  filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"
- name: "♻️ 自动选择"
  type: url-test
  include-all: true
  tolerance: 100
  interval: 180
  filter: "^((?!(直连)).)*$"
- name: "\U0001F310 全部节点"
  type: select
  include-all: true
